name: Run code coverage
on:
  push:
  workflow_dispatch:

permissions:
  contents: read
  actions: write

jobs:
  run-coverage:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    env:  # used by codecov-action
      OS: ${{ matrix.os }}
      PYTHON: '3.11'
    steps:
      - name: Cancel any previous incomplete runs
        uses: styfle/cancel-workflow-action@0.12.1
        with:
          all_but_latest: true
          access_token: ${{ github.token }}

      - uses: actions/checkout@v6
        with:
          submodules: 'recursive'
          fetch-depth: 0  # fetch tags

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test]"  # must install in editable mode for coverage to find sources
          python -m pip list

      - name: Run tests and generate coverage report
        run: |
          pytest --cov
          python -m coverage xml  # codecov uploader requires xml format
          python -m coverage report -m

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true
